<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Careerlog</title>
  <link rel="stylesheet" href="../styles/tokens.css">
  <link rel="stylesheet" href="../styles/popup.css">
</head>
<body>
  <div id="app">
    <header class="topbar">
      <p class="brand">Careerlog</p>
      <div class="topbar-actions">
        <span class="live">live</span>
        <button id="btn-dashboard" class="mini ghost" type="button">Dashboard</button>
        <button id="btn-settings" class="mini ghost" type="button">Settings</button>
      </div>
    </header>

    <section id="state-setup" class="state hidden">
      <h2>Track applications automatically</h2>
      <p>Connect AI + Google once and we keep your sheet updated.</p>
      <button id="btn-setup" class="cta">Get Started</button>
    </section>

    <section id="state-active" class="state hidden">
      <div class="stats">
        <article>
          <span id="stat-total" class="stat-num">0</span>
          <p>applied</p>
        </article>
        <article>
          <span id="stat-interviews" class="stat-num">0</span>
          <p>interviews</p>
        </article>
        <article>
          <span id="stat-offers" class="stat-num">0</span>
          <p>offers</p>
        </article>
      </div>

      <div class="activity">
        <p class="label">Latest Activity</p>
        <ul id="activity-list">
          <li><span class="dot neutral"></span><span>No sync history yet</span><time>now</time></li>
        </ul>
      </div>

      <div class="actions">
        <button id="btn-open-sheet" class="cta">Open sheet</button>
        <button id="btn-sync" class="ghost">Sync now</button>
      </div>

      <p id="sync-status" class="sync-status hidden" aria-live="polite">Syncing now...</p>

      <p class="footer" id="footer-text">Gemini - free tier</p>
    </section>

    <section id="state-error" class="state hidden">
      <p class="error-title">Sync needs attention</p>
      <p id="error-message"></p>
      <button id="btn-fix" class="cta">Fix Settings</button>
    </section>
  </div>

  <script type="module" src="./popup.js"></script>
</body>
</html>
