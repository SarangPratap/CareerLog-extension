<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Careerlog Settings</title>
  <link rel="stylesheet" href="../styles/tokens.css">
  <style>
    body { background: var(--surface); color: var(--on2); }
    main { max-width: 760px; margin: 0 auto; padding: 28px; display: grid; gap: 1.75rem; }
    header { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    h1 { color: var(--on1); }
    .card { background: #f6f7f8; border-radius: 12px; padding: 20px 22px; display: grid; gap: 12px; }
    label { font-size: 13px; color: var(--on3); display: grid; gap: 6px; }
    input, select { border: none; border-radius: 10px; background: var(--surface2); color: var(--on1); padding: 12px; }
    .row { display: grid; grid-template-columns: 1fr auto; gap: 10px; }
    .toggles { display: grid; gap: 8px; }
    .toggle { display: flex; align-items: center; gap: 8px; }
    button { border: none; border-radius: 10px; padding: 11px 14px; cursor: pointer; font-family: 'Manrope', sans-serif; font-weight: 600; }
    .cta { background: var(--c1); color: var(--on1); }
    .ghost { background: var(--surface2); color: var(--on2); }
    .status { min-height: 20px; }
    .error { color: var(--danger-text); }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1 class="brand">Careerlog Settings</h1>
        <p>Update your provider, key, and automation preferences.</p>
      </div>
      <div class="row">
        <button id="open-dashboard" class="ghost" type="button">Open Dashboard</button>
        <button id="go-home" class="ghost" type="button">Back to Home</button>
      </div>
    </header>

    <section class="card">
      <label for="provider">AI Provider
        <select id="provider">
          <option value="gemini">Gemini</option>
          <option value="claude">Claude</option>
          <option value="openai">OpenAI</option>
        </select>
      </label>

      <label for="api-key">API Key
        <div class="row">
          <input id="api-key" type="password" placeholder="Paste API key">
          <button id="toggle-key" class="ghost" type="button">Show</button>
        </div>
      </label>

      <label for="sensitivity">Email Sensitivity
        <select id="sensitivity">
          <option value="strict">Strict</option>
          <option value="balanced" selected>Balanced</option>
          <option value="liberal">Liberal</option>
        </select>
      </label>

      <label for="sheet-id">Google Sheet ID
        <input id="sheet-id" type="text" placeholder="Paste existing sheet ID (optional)">
      </label>

      <div class="toggles">
        <label class="toggle"><input id="track-outreach" type="checkbox"> Track recruiter outreach</label>
        <label class="toggle"><input id="notifications" type="checkbox"> Enable notifications</label>
      </div>

      <div class="row">
        <button id="connect-google" class="ghost" type="button">Reconnect Google</button>
        <button id="save-settings" class="cta" type="button">Save settings</button>
      </div>

      <p id="status" class="status" role="status" aria-live="polite"></p>
    </section>
  </main>

  <script src="../lib/auth.js"></script>
  <script src="./settings.js"></script>
</body>
</html>
